<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FortyFive</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <canvas id="canvas"></canvas>
  <div id="controls">
    <button id="btn-pause" title="Play/Pause (Space)">⏸</button>
    <label title="Speed">
      <input type="range" id="slider-speed" min="0.25" max="5" step="0.25" value="1">
      <span id="speed-label">1×</span>
    </label>
    <select id="select-scene" title="Scene"></select>
    <button id="btn-export" title="Save as PNG">💾</button>
  </div>
  <script type="module" src="js/main.js"></script>
</body>
</html>
